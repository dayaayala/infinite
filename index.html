<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Enzo Mari redux</title>
    <style>
        img {
            max-width: 100%;
            cursor: pointer;
        }

        img:hover {
            filter: hue-rotate(300deg);
        }

        .pile {
            position: relative;
            width: 100%;
            height: calc(100vh - 40px);
            overflow: hidden;
        }

        .photo {
            position: absolute;
            transform-origin: center center;
        }
    </style>
</head>

<body>
    <div class="credit">This website is based on the design of the <a href="https://enzomari.com/">Enzo Mari archive</a> by <a href="https://jon-l.com/">Jon Lucas</a>.</div>
    <div class="pile" id="pile"></div>
    
    <script>
        // define your "batch of images" in an array
       var images = [
                "<img src='images/photo_1.png'>",
                "<img src='images/photo_2.png'>",
                "<img src='images/photo_3.png'>",
                "<img src='images/photo_4.png'>",
                "<img src='images/photo_5.png'>",
                "<img src='images/photo_6.png'>",
                "<img src='images/photo_7.png'>",
                "<img src='images/photo_8.png'>",
                "<img src='images/photo_9.png'>",
                "<img src='images/photo_10.png'>",
                "<img src='images/photo_11.png'>",
                "<img src='images/photo_12.png'>",
            ]

        // this function randomly picks an image from the batch
        function random_image() {
            return Math.floor(Math.random() * images.length);
        }

        var image_count = 0;

        // this function adds the randomly-selected image to the page
        function add_image() {
            var pile = document.getElementById('pile');

            // first you make a new div for the image.
            var new_image = document.createElement('div');
            new_image.className = 'photo';

            // then you set the div's inner-HTML, ie its content, to the chosen img tag
            new_image.innerHTML = images[random_image()];

            // these two lines pick a random width for the image.
            // 300 is the MAX width, and 100 is the MIN width.
            var random_width = Math.floor(Math.random() * (300 - 100 + 1) + 100);
            var random_width_pixels = random_width + "px";

            // assign that random width to the new image
            new_image.style.width = random_width_pixels;

            // place images in a loose stack near the center
            var random_x_offset = Math.floor(Math.random() * 240) - 120;
            var random_y_offset = Math.floor(Math.random() * 240) - 120;
            var random_rotation = Math.floor(Math.random() * 30) - 15;
            new_image.style.left = '50%';
            new_image.style.top = '50%';
            new_image.style.transform = "translate(-50%, -50%) translate(" + random_x_offset + "px, " + random_y_offset + "px) rotate(" + random_rotation + "deg)";
            new_image.style.zIndex = image_count;
            image_count += 1;

            // add the new image to the pile container (so it's visible!)
            pile.append(new_image);

            // last step! set up the click. 
            // You want your image to 'listen' for clicks. When its clicked, it adds a new image.
            new_image.addEventListener('click', add_image);
        }

        // so that the first image appears when the page load, run the function once.
        add_image();
    </script>
</body>

</html>
